services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: smartposture
      POSTGRES_PASSWORD: smartposture
      POSTGRES_DB: smartposture
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartposture"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://smartposture:smartposture@db:5432/smartposture
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
